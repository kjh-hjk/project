<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>音と詩集：太陽フレアは陽光になりたい</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app">
  <div id="frame">
    <div id="stage">
  <img id="bg-sketch" src="assets/sketch.webp" alt="">
  <img id="bg-desk" src="assets/desk_on.webp" alt="">
    </div>

    <div id="fade-black"></div>

    <img id="title" src="assets/title.webp" alt="title">

    <div id="hit-layer">
      <button class="hit" id="hit-lamp" type="button"></button>
      <button class="hit" id="hit-book" type="button"></button>
      <button class="hit" id="hit-radio" type="button"></button>
      <button class="hit" id="hit-coffee" type="button"></button>
    </div>

<!-- COFFEE 演出レイヤー（最初は非表示） -->
<div id="coffee-fx" hidden inert>
  <img id="coffee-steam" alt="">
  <div id="coffee-banner">
    <img id="coffee-banner-img" alt="">
    <p id="coffee-banner-text"></p>
  </div>
</div>

<!-- BOOK画面（最初は非表示） -->
<div id="book-scene" hidden inert>

  <!-- 背景 -->
  <img id="book-bg" alt="">

  <!-- ✅ 挿絵の固定枠（白い紙エリア） -->
  <div id="book-ill-wrap" aria-hidden="true">
  <canvas id="book-ill-canvas" hidden></canvas>
  <canvas id="book-ill-canvas2" hidden></canvas>
  <img id="book-ill" alt="">

  <!-- leafwing用：葉だけ触れる透明レイヤー -->
  <div id="leafwing-hit-layer" hidden aria-hidden="true">
    <button class="leaf-hit" data-leaf="0" type="button" aria-label="leaf 1"></button>
    <button class="leaf-hit" data-leaf="1" type="button" aria-label="leaf 2"></button>
    <button class="leaf-hit" data-leaf="2" type="button" aria-label="leaf 3"></button>
    <button class="leaf-hit" data-leaf="3" type="button" aria-label="leaf 4"></button>
    <button class="leaf-hit" data-leaf="4" type="button" aria-label="leaf 5"></button>
    <button class="leaf-hit" data-leaf="5" type="button" aria-label="leaf 6"></button>
    <button class="leaf-hit" data-leaf="6" type="button" aria-label="leaf 7"></button>
    <button class="leaf-hit" data-leaf="7" type="button" aria-label="leaf 8"></button>
    <button class="leaf-hit" data-leaf="8" type="button" aria-label="leaf 9"></button>
  </div>

  <!-- candle用：炎だけ触れる透明レイヤー -->
  <div id="candle-hit-layer" hidden aria-hidden="true">
    <button id="candle-flame-hit" type="button" aria-label="candle flame"></button>
  </div>

  <div id="eyehand-hit-layer" hidden aria-hidden="true">
    <button id="eyehand-hand-hit" type="button" aria-label="hand"></button>
  </div>

  <div id="oxgame-hit-layer" hidden aria-hidden="true">
    <button class="ox-token-hit" data-token="0" type="button" aria-label="token 1"></button>
    <button class="ox-token-hit" data-token="1" type="button" aria-label="token 2"></button>
    <button class="ox-token-hit" data-token="2" type="button" aria-label="token 3"></button>
    <button class="ox-token-hit" data-token="3" type="button" aria-label="token 4"></button>
    <button class="ox-token-hit" data-token="4" type="button" aria-label="token 5"></button>
    <button class="ox-token-hit" data-token="5" type="button" aria-label="token 6"></button>
    <button class="ox-token-hit" data-token="6" type="button" aria-label="token 7"></button>
    <button class="ox-token-hit" data-token="7" type="button" aria-label="token 8"></button>
    <button class="ox-token-hit" data-token="8" type="button" aria-label="token 9"></button>
    <button class="ox-token-hit" data-token="9" type="button" aria-label="token 10"></button>
  </div>

  <div id="chips-hit-layer" hidden aria-hidden="true">
    <!-- アイテム本体（最大10個） -->
    <button class="chips-item-hit" data-item="0" type="button" aria-label="chips item 1"></button>
    <button class="chips-item-hit" data-item="1" type="button" aria-label="chips item 2"></button>
    <button class="chips-item-hit" data-item="2" type="button" aria-label="chips item 3"></button>
    <button class="chips-item-hit" data-item="3" type="button" aria-label="chips item 4"></button>
    <button class="chips-item-hit" data-item="4" type="button" aria-label="chips item 5"></button>
    <button class="chips-item-hit" data-item="5" type="button" aria-label="chips item 6"></button>
    <button class="chips-item-hit" data-item="6" type="button" aria-label="chips item 7"></button>
    <button class="chips-item-hit" data-item="7" type="button" aria-label="chips item 8"></button>
    <button class="chips-item-hit" data-item="8" type="button" aria-label="chips item 9"></button>
    <button class="chips-item-hit" data-item="9" type="button" aria-label="chips item 10"></button>

    <!-- 袋 -->
    <button id="chips-bag-hit" type="button" aria-label="chips bag"></button>

    <!-- adのcloseボタン（最大5個） -->
    <button class="chips-ad-close-hit" data-adclose="0" type="button" aria-label="close ad 1"></button>
    <button class="chips-ad-close-hit" data-adclose="1" type="button" aria-label="close ad 2"></button>
    <button class="chips-ad-close-hit" data-adclose="2" type="button" aria-label="close ad 3"></button>
    <button class="chips-ad-close-hit" data-adclose="3" type="button" aria-label="close ad 4"></button>
    <button class="chips-ad-close-hit" data-adclose="4" type="button" aria-label="close ad 5"></button>
  </div>

  <div id="moon-hit-layer" hidden aria-hidden="true">
    <button id="moon-drag-hit" type="button" aria-label="moon texture drag"></button>
  </div>

  <div id="lastdoor-hit-layer" hidden aria-hidden="true">
    <button id="lastdoor-flashlight-hit" type="button" aria-label="flashlight drag"></button>
    <button id="lastdoor-bag-hit" type="button" aria-label="bag"></button>
    <button id="lastdoor-knob-hit" type="button" aria-label="door knob"></button>
  </div>

  <div id="strings-hit-layer" hidden aria-hidden="true">
    <button id="strings-area-hit" type="button" aria-label="strings area"></button>
  </div>
</div>
  
  <img id="book-pageflip" alt="">
  <div id="book-fade"></div>
  <img id="book-blink" alt="">

  <!-- 詩テキスト（縦書き） -->
  <div id="book-text">
    <div class="poem-vertical" id="poem-area"></div>
  </div>

  <!-- 操作UI -->
  <button id="book-prev" type="button" aria-label="previous"></button>
  <button id="book-next" type="button" aria-label="next"></button>
  <button id="book-close" type="button" aria-label="close"></button>
</div>

<!-- RADIO画面（最初は非表示） -->
<div id="radio-scene" hidden inert>
  <!-- 下：目盛り -->
  <img id="radio-scale" alt="">

  <!-- 中：ラジオ本体（背景） -->
  <img id="radio-bg" alt="">

  <!-- 上：操作パーツ -->
  <img id="radio-channel" alt="" draggable="false">
  <img id="radio-volume" alt="" draggable="false">

  <!-- スイッチ（クリック） -->
  <button id="radio-switch" type="button" aria-label="radio switch"></button>

  <!-- 音量表示（ONの時だけ出す） -->
  <div id="radio-volume-label" aria-hidden="true">音量：0%</div>

  <!-- 閉じる -->
  <button id="radio-close" type="button" aria-label="close"></button>

  <!-- 音（DOMに置いておく） -->
  <audio id="audio-noise" src="assets/noise.mp3" loop preload="auto"></audio>
  <audio id="audio-music" preload="auto"></audio>
</div>
  </div>
</div>

  <script src="js/main.js"></script>
</body>
</html>
